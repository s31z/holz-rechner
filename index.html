<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Holz-Volumen Rechner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Holz-Volumen Rechner</h1>
      <p class="sub">Berechnet Radius und Zylindervolumen aus <b>Länge</b> und <b>Umfang</b>.</p>
    </header>

    <section class="card">
      <div class="toolbar">
        <button id="clearAllBtn" type="button" class="secondary">Alle Werte löschen</button>
      </div>

      <div class="tableWrap">
        <table id="calcTable" aria-label="Holz Volumen Tabelle">
          <thead>
            <tr>
              <th>Länge (cm)</th>
              <th>Umfang (cm)</th>
              <th></th>
              <th>Radius (m)</th>
              <th>Volumen (m³)</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
          <tfoot>
            <tr>
              <td colspan="2" class="sumLabel">Summe</td>
              <td colspan="2" id="sumCell" class="sumValue">0</td>
              <td> m³</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>

      <details class="details">
        <summary>Formeln</summary>
        <ul>
          <li><code>Radius (m) = Umfang(cm) / 100 / 2 / π</code></li>
          <li><code>Volumen (m³) = π × Radius² × Länge(cm)/100</code></li>
        </ul>
      </details>
    </section>

  </main>

  <script>
    window.__INITIAL_ROWS__ = [];
  </script>
  <script src="app.js"></script>
</body>
</html>
